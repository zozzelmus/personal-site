<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Dad</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 32px 12px;
    background: #0A130A;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: 'VT323', 'Courier New', monospace;
    position: relative;
  }

  /* =========================================================
     FOREST BACKGROUND  (tiled pine forest behind the card)
     ========================================================= */
  .forest-bg {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
    image-rendering: pixelated;
  }
  /* Vignette so center is darker, focusing eye on the card */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 90%);
    pointer-events: none;
    z-index: 1;
  }

  .card-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 2;
    image-rendering: pixelated;
  }

  /* =========================================================
     CARD  (outer wood frame + inner parchment paper)
     ========================================================= */
  .card {
    width: 680px;
    max-width: 100%;
    position: relative;
    padding: 18px;
    box-sizing: border-box;
    /* Wood plank background with grain */
    background:
      /* horizontal plank seams */
      repeating-linear-gradient(0deg,
        transparent 0 38px,
        rgba(0,0,0,0.45) 38px 40px,
        transparent 40px 78px,
        rgba(255,255,255,0.05) 78px 79px),
      /* vertical wood grain wisps */
      repeating-linear-gradient(90deg,
        rgba(0,0,0,0.08) 0 2px,
        transparent 2px 7px,
        rgba(255,255,255,0.04) 7px 8px,
        transparent 8px 18px),
      /* base wood gradient */
      linear-gradient(180deg, #5A3520 0%, #6B4226 25%, #4A2D18 55%, #6B4226 80%, #5A3520 100%);
    border: 3px solid #1F1108;
    box-shadow:
      inset 0 0 0 2px #8B5A2B,
      inset 0 0 18px rgba(0,0,0,0.45),
      0 10px 28px rgba(0,0,0,0.7);
    image-rendering: pixelated;
    animation: card-in 0.8s ease-out both;
  }
  @keyframes card-in {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Brass rivets at the 4 corners of the wood frame */
  .rivet {
    position: absolute;
    width: 16px;
    height: 16px;
    background: radial-gradient(circle at 35% 30%,
      #FFE680 0%, #E8B038 25%, #B8861A 55%, #6B4D10 85%, #2A1B05 100%);
    border-radius: 50%;
    border: 1px solid #1A0E03;
    box-shadow:
      inset -1px -2px 2px rgba(0,0,0,0.55),
      inset 1px 1px 1px rgba(255,230,120,0.5),
      0 2px 3px rgba(0,0,0,0.6);
    z-index: 3;
  }
  .rivet::after {
    /* tiny cross-slot screw head */
    content: "";
    position: absolute;
    inset: 4px;
    background:
      linear-gradient(90deg, transparent 45%, rgba(0,0,0,0.55) 45% 55%, transparent 55%),
      linear-gradient(0deg,  transparent 45%, rgba(0,0,0,0.55) 45% 55%, transparent 55%);
  }
  .rivet.tl { top: 6px;    left: 6px; }
  .rivet.tr { top: 6px;    right: 6px; }
  .rivet.bl { bottom: 6px; left: 6px; }
  .rivet.br { bottom: 6px; right: 6px; }

  /* Inner parchment paper area */
  .paper {
    background: #F4E2B8;
    padding: 22px 18px 20px;
    border: 3px solid #2A1810;
    box-shadow:
      inset 0 0 0 2px #8B5A2B,
      inset 0 0 22px rgba(139, 90, 43, 0.18);
    position: relative;
  }
  /* Subtle parchment specks */
  .paper::before {
    content: "";
    position: absolute;
    inset: 6px;
    background-image:
      radial-gradient(circle at 12% 30%, rgba(139,90,43,0.07) 0 2px, transparent 3px),
      radial-gradient(circle at 80% 60%, rgba(139,90,43,0.07) 0 2px, transparent 3px),
      radial-gradient(circle at 45% 88%, rgba(139,90,43,0.06) 0 2px, transparent 3px);
    pointer-events: none;
  }

  /* =========================================================
     TITLE BANNER  (wood-burned plaque feel)
     ========================================================= */
  .title-banner {
    background: #E8C98A;
    border: 4px solid #3A2014;
    padding: 18px 12px 14px;
    text-align: center;
    margin: 0 0 18px;
    box-shadow:
      inset 0 0 0 2px #8B5A2B,
      inset 0 0 24px rgba(74, 45, 24, 0.35);
    position: relative;
  }
  /* Iron nail heads in the banner corners */
  .title-banner::before,
  .title-banner::after {
    content: "";
    position: absolute;
    width: 8px;
    height: 8px;
    background: radial-gradient(circle at 35% 30%, #888 0%, #555 50%, #222 100%);
    border-radius: 50%;
    border: 1px solid #1A1A1A;
    top: 6px;
  }
  .title-banner::before { left: 8px; }
  .title-banner::after  { right: 8px; }
  .title-banner h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    color: #3A2014;
    margin: 0 0 14px;
    line-height: 1.3;
    letter-spacing: 1px;
    font-weight: normal;
    text-shadow:
      1px 1px 0 #C09454,
      2px 2px 0 rgba(0,0,0,0.25);
  }
  .title-banner .sub {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: #5A3520;
    letter-spacing: 1px;
  }

  /* =========================================================
     SCENE  (sundown grill scene)
     ========================================================= */
  .scene {
    position: relative;
    height: 360px;
    margin: 0;
    border: 4px solid #2A1810;
    box-shadow: inset 0 0 0 2px #8B5A2B;
    overflow: hidden;
    background: #060718;
  }
  .scene svg {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  /* Animated smoke rising from grill */
  .smoke-puff {
    transform-origin: center;
    animation: smoke-rise 4s ease-out infinite;
    opacity: 0;
  }
  .smoke-puff.p1 { animation-delay: 0s; }
  .smoke-puff.p2 { animation-delay: 1.3s; }
  .smoke-puff.p3 { animation-delay: 2.6s; }
  @keyframes smoke-rise {
    0%   { transform: translate(0, 0) scale(1); opacity: 0; }
    15%  { opacity: 0.85; }
    50%  { opacity: 0.6; }
    100% { transform: translate(-3px, -22px) scale(1.6); opacity: 0; }
  }

  /* Flickering flames in the grill */
  .flames {
    animation: flame-flicker 0.45s steps(2, end) infinite;
  }
  @keyframes flame-flicker {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.75; }
  }

  /* Pulsing sun glow */
  .sun-glow {
    animation: sun-pulse 3.5s ease-in-out infinite;
  }
  @keyframes sun-pulse {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 0.85; }
  }

  /* Twinkling stars */
  .star-twinkle { animation: twinkle 2.4s ease-in-out infinite; }
  .star-twinkle.s2 { animation-delay: 0.8s; }
  .star-twinkle.s3 { animation-delay: 1.6s; }
  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }

  /* Birds drifting across the sky */
  .bird-flock { animation: bird-drift 16s linear infinite; }
  @keyframes bird-drift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(40px); }
  }

  /* =========================================================
     MESSAGE PANEL  (wood-framed parchment plaque)
     ========================================================= */
  .message-panel {
    background: #F4E2B8;
    border: 5px solid #3A2014;
    margin: 18px 0 0;
    padding: 18px 22px 22px 22px;
    position: relative;
    box-shadow:
      inset 0 0 0 2px #8B5A2B,
      inset 0 0 22px rgba(74,45,24,0.18),
      4px 4px 0 rgba(0,0,0,0.25);
  }
  /* Iron screw heads at the 4 corners of the plaque */
  .screw {
    position: absolute;
    width: 8px;
    height: 8px;
    background: radial-gradient(circle at 35% 30%, #999 0%, #555 50%, #222 100%);
    border-radius: 50%;
    border: 1px solid #1A1A1A;
  }
  .screw::after {
    /* slot */
    content: "";
    position: absolute;
    inset: 1px 0;
    background: linear-gradient(90deg, transparent 35%, rgba(0,0,0,0.7) 35% 65%, transparent 65%);
    transform: rotate(35deg);
  }
  .screw.tl { top: 5px;    left: 5px; }
  .screw.tr { top: 5px;    right: 5px; }
  .screw.bl { bottom: 5px; left: 5px; }
  .screw.br { bottom: 5px; right: 5px; }

  .message-panel h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: #3A2014;
    margin: 0 0 14px;
    letter-spacing: 1px;
    font-weight: normal;
    text-shadow: 1px 1px 0 rgba(139,90,43,0.35);
  }
  .message-panel p {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: #3A2014;
    line-height: 1.3;
    margin: 0 0 10px;
    letter-spacing: 0.5px;
  }
  .signoff {
    font-family: 'Press Start 2P', monospace !important;
    font-size: 12px !important;
    color: #5A3520 !important;
    margin-top: 14px !important;
    letter-spacing: 1px;
    line-height: 1.6 !important;
  }

  @media (max-width: 720px) {
    body { zoom: calc(100vw / 720px); }
  }
  @supports not (zoom: 1) {
    @media (max-width: 720px) {
      body {
        transform: scale(calc(100vw / 720px));
        transform-origin: top center;
        width: 720px;
        overflow-x: hidden;
      }
    }
  }
</style>
</head>
